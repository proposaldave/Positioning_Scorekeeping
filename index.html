<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Positioning & Scoring — Four Levels Academy</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --nepc-navy: #0A1A2F;
            --nepc-navy-light: #1B4079;
            --nepc-blue: #4DA6FF;
            --nepc-red: #C8102E;
            --nepc-green: #9EF01A;
            --court-blue: #234e8c;
            --court-gray: #718096;
            --court-burgundy: #6b0f1a;
            --team-serve: #9b5de5;
            --team-return: #00bbf9;
            --glass: rgba(27, 64, 121, 0.4);
            --glass-border: rgba(255, 255, 255, 0.1);
            --success: #28a745;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0; padding: 0;
            background-color: var(--nepc-navy);
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container { width: 100%; max-width: 650px; padding: 20px; display: flex; flex-direction: column; gap: 12px; }

        /* --- HERO INTRO ANIMATION --- */
        .hero-container {
            position: relative; width: 100%; height: 240px;
            background: radial-gradient(circle at center, var(--nepc-navy-light) 0%, var(--nepc-navy) 100%);
            border-radius: 16px; border: 1px solid var(--glass-border); overflow: hidden;
            display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .hero-grid {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background-image: linear-gradient(rgba(77, 166, 255, 0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(77, 166, 255, 0.05) 1px, transparent 1px);
            background-size: 20px 20px; z-index: 1;
        }

        .hero-bg-score {
            position: absolute; font-family: 'Montserrat', sans-serif; font-size: 90px; font-weight: 800;
            color: rgba(255, 255, 255, 0.03); letter-spacing: 5px; z-index: 2;
            animation: pulseScore 4s infinite alternate; white-space: nowrap;
        }

        @keyframes pulseScore { 0% { transform: scale(0.95); color: rgba(255, 255, 255, 0.02); } 100% { transform: scale(1.05); color: rgba(255, 255, 255, 0.06); } }

        .hero-mini-court { width: 75%; aspect-ratio: 44 / 20; border: 2px solid rgba(255,255,255,0.2); position: relative; z-index: 3; }
        .hm-line { position: absolute; background: rgba(255,255,255,0.2); }
        .hm-net { left: 50%; top: 0; bottom: 0; width: 2px; background: rgba(255,255,255,0.4); transform: translateX(-50%); }
        .hm-k-left { left: 34.1%; top: 0; bottom: 0; width: 1px; }
        .hm-k-right { right: 34.1%; top: 0; bottom: 0; width: 1px; }
        .hm-c-left { left: 0; width: 34.1%; top: 50%; height: 1px; }
        .hm-c-right { right: 0; width: 34.1%; top: 50%; height: 1px; }

        .hero-dot { position: absolute; width: 12px; height: 12px; border-radius: 50%; transform: translate(-50%, -50%); }
        .hd-serve { background: var(--team-serve); box-shadow: 0 0 8px var(--team-serve); }
        .hd-return { background: var(--team-return); box-shadow: 0 0 8px var(--team-return); }

        #hero-server { animation: heroServer 6s infinite cubic-bezier(0.4, 0, 0.2, 1); }
        #hero-server-partner { animation: heroServerPartner 6s infinite cubic-bezier(0.4, 0, 0.2, 1); }
        #hero-returner { animation: heroReturner 6s infinite cubic-bezier(0.4, 0, 0.2, 1); }
        #hero-returner-partner { left: 31%; top: 25%; }

        @keyframes heroServer { 0%, 32% { left: 105%; top: 25%; } 48%, 90% { left: 69%; top: 25%; } 95%, 100% { left: 105%; top: 25%; } }
        @keyframes heroServerPartner { 0%, 32% { left: 105%; top: 75%; } 48%, 90% { left: 69%; top: 75%; } 95%, 100% { left: 105%; top: 75%; } }
        @keyframes heroReturner { 0%, 16% { left: -5%; top: 75%; } 32%, 90% { left: 31%; top: 75%; } 95%, 100% { left: -5%; top: 75%; } }

        .hero-ball { position: absolute; width: 8px; height: 8px; background: var(--nepc-green); border-radius: 50%; box-shadow: 0 0 12px var(--nepc-green); z-index: 4; transform: translate(-50%, -50%); animation: heroBall 6s infinite cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes heroBall { 0% { left: 105%; top: 25%; opacity: 1; } 16% { left: -5%; top: 75%; opacity: 1; } 32% { left: 105%; top: 25%; opacity: 1; } 48% { left: 31%; top: 25%; opacity: 1; } 64% { left: 69%; top: 75%; opacity: 1; } 80% { left: 31%; top: 75%; opacity: 1; } 90% { left: 69%; top: 25%; opacity: 0; } 100% { left: 105%; top: 25%; opacity: 0; } }

        /* --- UI COMPONENTS --- */
        header { border-left: 6px solid var(--nepc-red); padding-left: 16px; margin-bottom: 0px; }
        h1 { font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 20px; margin: 0; text-transform: uppercase; letter-spacing: 0.5px; }

        .slim-instruction {
            background: var(--glass); border-radius: 12px; padding: 12px 16px; border: 1px solid var(--glass-border);
            display: flex; flex-direction: column; justify-content: center; text-align: center; margin-bottom: 4px;
        }
        .step-label { color: var(--nepc-blue); font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
        .instruction-text { font-size: 15px; line-height: 1.4; color: rgba(255,255,255,0.95); font-weight: 600; }

        /* --- COURT SYSTEM --- */
        .court-wrapper { width: 100%; padding: 40px 50px; background: var(--court-gray); border-radius: 16px; position: relative; box-shadow: inset 0 0 30px rgba(0,0,0,0.3); margin: 5px 0; }
        .court-container { width: 100%; aspect-ratio: 44 / 20; border: 2px solid white; position: relative; background: var(--court-blue); overflow: visible; }
        .kitchen-area { position: absolute; top: 0; bottom: 0; width: 15.9%; background: var(--court-burgundy); }
        .kitchen-left-side { left: 34.1%; border-right: 2px solid white; }
        .kitchen-right-side { right: 34.1%; border-left: 2px solid white; }
        .net-line { position: absolute; left: 50%; top: 0; bottom: 0; width: 4px; background: white; z-index: 5; transform: translateX(-50%); }
        .center-line { position: absolute; height: 2px; background: white; top: 50%; width: 34.1%; transform: translateY(-50%); }
        .center-left { left: 0; } .center-right { right: 0; }

        .player {
            position: absolute; width: 28px; height: 28px; border-radius: 50%; background: #fff; border: 2px solid var(--nepc-navy);
            z-index: 20; transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); display: flex; align-items: center; justify-content: center;
            font-size: 13px; font-weight: 800; color: white; transform: translate(-50%, -50%);
        }
        #p1, #p2 { background: var(--team-serve); border-color: rgba(255,255,255,0.5); }
        #p3, #p4 { background: var(--team-return); border-color: rgba(255,255,255,0.5); }

        .ball {
            position: absolute; width: 14px; height: 14px; background: var(--nepc-green); border-radius: 50%; z-index: 25;
            box-shadow: 0 0 12px var(--nepc-green); transition: all 0.5s linear; transform: translate(-50%, -50%); display: none;
        }

        /* --- DYNAMIC VISUAL ELEMENTS --- */
        .visual-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 15; }
        
        .tooltip {
            position: absolute; background: rgba(10, 26, 47, 0.9); border: 1px solid var(--nepc-blue); color: white;
            padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: 700; white-space: nowrap;
            transform: translate(-50%, -35px); opacity: 0; transition: opacity 0.3s, transform 0.3s ease; z-index: 30;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .tooltip.show { opacity: 1; }
        .tooltip::after { 
            content: ''; position: absolute; top: 100%; left: var(--arrow-left, 50%); margin-left: -4px; 
            border-width: 4px; border-style: solid; border-color: var(--nepc-blue) transparent transparent transparent; 
            transition: left 0.3s ease;
        }

            position: abs
